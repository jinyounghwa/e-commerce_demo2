# Netlify 배포 설정
# 기본값(환경변수 없음): 정적 데모 모드 — 백엔드 없이 브라우저 내장 목 API로 전체 동작.
#   데이터는 localStorage에 저장되며, 모든 플로우(회원/상품/주문/배송/CS/관리자)가 동작합니다.
# 실제 백엔드 연동: Netlify 환경변수 VITE_API_BASE 를 백엔드 URL로 설정하면
#   데모 모드가 비활성화되고 해당 API를 호출합니다 (render.yaml 참조).
#   예) VITE_API_BASE = https://malldemo.onrender.com/api

[build]
  command = "npm run build:web && node scripts/generate-redirects.js"
  publish = "apps/web/dist"

[build.environment]
  # 웹 빌드는 better-sqlite3 네이티브 빌드가 불필요 → postinstall 차단으로 빌드 안정화
  NPM_FLAGS = "--ignore-scripts"
  NODE_VERSION = "20"

# SPA 라우팅 및 API 프록시는 scripts/generate-redirects.js 가 생성하는 dist/_redirects 파일에 의해 처리됩니다.
# (netlify.toml 의 [[redirects]] 규칙보다 우선적으로 적용됩니다)

